apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-study-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: k8s-study-app
  template:
    spec:
      initContainers:
        - name: init-sleep
          image: busybox:1.36
          command: ["sh", "-c", "sleep 10"]
      containers:
        - name: k8s-study-app
          image: andrewromanchukk/k8s-study-app:1.0.1
          ports:
            - containerPort: 8089   # change if your app uses a different port
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
